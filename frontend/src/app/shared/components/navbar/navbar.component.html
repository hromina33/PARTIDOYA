<nav class="navbar">
  <div class="container navbar-inner">
    <a routerLink="/" class="navbar-brand">PartidoYA</a>
    <div class="navbar-links">
      <a routerLink="/home" class="nav-link">Inicio</a>
      <a routerLink="/deportes" class="nav-link">Deportes</a>
      @if (isLoggedIn) {
        <a routerLink="/mis-partidos" class="nav-link">Mis Partidos</a>
      }
    </div>
    <div class="navbar-actions">
      @if (isLoggedIn) {
        <div class="user-menu">
          <button
            type="button"
            class="navbar-user"
            [class.active]="userMenuOpen"
            (click)="toggleUserMenu()"
            aria-haspopup="menu"
            [attr.aria-expanded]="userMenuOpen">
            {{ userName }}
          </button>
          @if (userMenuOpen) {
            <div class="user-dropdown" role="menu">
              <a routerLink="/mi-perfil" class="dropdown-item" role="menuitem" (click)="closeUserMenu()">Mi perfil</a>
              <button type="button" class="dropdown-item" role="menuitem" (click)="logout()">Cerrar sesion</button>
            </div>
          }
        </div>
      } @else {
        <a routerLink="/login" class="btn btn-outline btn-sm">Iniciar sesion</a>
        <a routerLink="/register" class="btn btn-primary btn-sm">Crear cuenta</a>
      }
    </div>
  </div>
</nav>
