<section class="auth-page">
  <div class="auth-card">
    <h1>Crear cuenta</h1>
    <p class="auth-subtitle">Unete a la comunidad deportiva</p>
    @if (errorMessage) {
      <div class="error-message">{{ errorMessage }}</div>
    }
    <form class="auth-form" (submit)="onSubmit($event)">
      <div class="form-group">
        <label for="fullName">Nombre completo</label>
        <input id="fullName" type="text" [(ngModel)]="fullName" name="fullName" placeholder="Ingresa tu nombre completo" required>
      </div>
      <div class="form-group">
        <label for="email">Correo electronico</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="tu@correo.com" required>
      </div>
      <div class="form-group">
        <label for="password">Contrasena</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="Minimo 8 caracteres" required>
      </div>
      <div class="form-group">
        <label for="role">Tipo de cuenta</label>
        <select id="role" [(ngModel)]="role" name="role" required>
          <option value="JUGADOR">Jugador</option>
          <option value="ADMIN_CANCHA">Administrador de cancha</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Registrarme</button>
    </form>
    <p class="auth-footer">Ya tienes cuenta? <a routerLink="/login">Inicia sesion</a></p>
  </div>
</section>
