<section class="auth-page">
  <div class="auth-card">
    <h1>Iniciar sesion</h1>
    <p class="auth-subtitle">Bienvenido de vuelta</p>
    @if (errorMessage) {
      <div class="error-message">{{ errorMessage }}</div>
    }
    <form class="auth-form" (submit)="onSubmit($event)">
      <div class="form-group">
        <label for="email">Correo electronico</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="tu@correo.com" required>
      </div>
      <div class="form-group">
        <label for="password">Contrasena</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="Tu contrasena" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
    </form>
    <p class="auth-footer">No tienes cuenta? <a routerLink="/register">Crear cuenta</a></p>
  </div>
</section>
