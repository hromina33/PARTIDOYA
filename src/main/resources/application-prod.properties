# MySQL
spring.datasource.url=jdbc:mysql://${DATABASE_URL}:${DATABASE_PORT:3306}/${DATABASE_NAME}?useSSL=true&serverTimezone=UTC&createDatabaseIfNotExist=false&publicKeyRetrieval=true
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://partidoya.pro,https://www.partidoya.pro,http://localhost:4200,http://127.0.0.1:4200}
cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:https://*.vercel.app,https://*.partidoya.pro}
